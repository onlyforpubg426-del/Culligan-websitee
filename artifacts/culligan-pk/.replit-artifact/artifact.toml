kind = "web"
previewPath = "/"
title = "Culligan Pakistan"
version = "1.0.0"
id = "artifacts/culligan-pk"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25549

[services.development]
run = "pnpm --filter @workspace/culligan-pk run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/culligan-pk", "run", "build" ]
publicDir = "artifacts/culligan-pk/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25549"
BASE_PATH = "/"
